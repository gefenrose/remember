<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#B8A9C9"/>
      <stop offset="33%"  stop-color="#A8C4B8"/>
      <stop offset="66%"  stop-color="#C4B8A0"/>
      <stop offset="100%" stop-color="#B8A9C9"/>
    </linearGradient>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#f7f2ea"/>
      <stop offset="100%" stop-color="#ede8de"/>
    </linearGradient>
  </defs>

  <!-- Warm parchment background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Italic serif "k" lettermark -->
  <text
    x="256"
    y="350"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="300"
    font-style="italic"
    font-weight="400"
    fill="#2B2825"
    text-anchor="middle"
  >k</text>

  <!-- Signature gradient ribbon -->
  <rect x="96" y="382" width="320" height="14" rx="7" fill="url(#ribbon)"/>
</svg>
